---
# ansible/tasks/macos-trust.yaml
# Trusts the tart-lab Root CA from the Talos-on-mac cluster on macOS.
#
# Usage:
#   ansible-playbook -i localhost, -c local ansible/site.yaml
#
# Or include in a larger playbook:
#   - include_tasks: tasks/macos-trust.yaml
#     when: ansible_os_family == "Darwin"
#
# Variables (override via group_vars or extra-vars):
#   kubeconfig: path to kubeconfig (default: /tmp/kubeconfig.yaml)
#   cluster_ca_secret: name of secret holding CA cert (default: root-ca-secret)
#   cluster_ca_namespace: namespace of CA secret (default: cert-manager)
#   ca_display_name: display name for Keychain entry (default: tart-lab Root CA)

- name: Set CA trust variables
  set_fact:
    kubeconfig: "{{ kubeconfig | default('/tmp/kubeconfig.yaml') }}"
    ca_secret: "{{ cluster_ca_secret | default('root-ca-secret') }}"
    ca_namespace: "{{ cluster_ca_namespace | default('cert-manager') }}"
    ca_name: "{{ ca_display_name | default('tart-lab Root CA') }}"
    ca_tmp_path: "/tmp/tart-lab-root-ca.crt"

- name: Check if CA is already trusted
  command: >
    security find-certificate -c "{{ ca_name }}"
    /Library/Keychains/System.keychain
  register: ca_check
  failed_when: false
  changed_when: false

- name: Extract CA cert from cluster
  shell: |
    kubectl --kubeconfig {{ kubeconfig }} \
      get secret {{ ca_secret }} -n {{ ca_namespace }} \
      -o jsonpath='{.data.tls\.crt}' | base64 -d > {{ ca_tmp_path }}
  when: ca_check.rc != 0
  register: ca_extract

- name: Trust CA in macOS System Keychain
  command: >
    security add-trusted-cert -d -r trustRoot
    -k /Library/Keychains/System.keychain
    {{ ca_tmp_path }}
  become: true
  when: ca_check.rc != 0 and ca_extract is succeeded

- name: Verify CA is now trusted
  command: >
    security find-certificate -c "{{ ca_name }}"
    /Library/Keychains/System.keychain
  register: verify
  failed_when: verify.rc != 0
  changed_when: false

- name: Report CA trust status
  debug:
    msg: "✅ '{{ ca_name }}' is trusted in System Keychain"
  when: verify.rc == 0
