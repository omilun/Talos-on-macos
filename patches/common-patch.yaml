# common-patch.yaml — applied to BOTH controlplane and worker nodes
# Disables kube-proxy (Cilium eBPF replaces it), disables default CNI (Flannel),
# and tunes kubelet for Cilium eBPF.
---
cluster:
  proxy:
    disabled: true          # Cilium kube-proxy replacement takes over
  network:
    cni:
      name: none            # Disable Talos-managed Flannel; Cilium installed post-bootstrap

machine:
  network:
    nameservers:
      - 8.8.8.8
      - 1.1.1.1
  kubelet:
    extraArgs:
      rotate-server-certificates: "true"
    extraConfig:
      serverTLSBootstrap: true
  # Talos-recommended sysctls for Cilium eBPF
  sysctls:
    net.core.bpf_jit_enable: "1"
    net.ipv4.conf.all.rp_filter: "0"
    net.ipv4.conf.default.rp_filter: "0"
  kernel:
    modules:
      - name: br_netfilter
      # NOTE: ip6_tables is NOT included — module is absent on Talos ARM64 and causes log noise
  # Registry config: containerd on nodes can reach the LB IP but the cert-manager CA
  # is not in Talos's trust store. insecureSkipVerify allows pulls over HTTPS without
  # cert verification (acceptable for an internal homelab registry).
  registries:
    config:
      registry.talos-tart-ha.talos-on-macos.com:
        tls:
          insecureSkipVerify: true
