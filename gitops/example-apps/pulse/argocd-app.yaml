# ArgoCD Application — pulse
# Deploys Pulse microservices (auth, longterm, daily, frontend + databases + routing).
# K8s manifests live in the infra repo — clean separation from application code.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pulse
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: apps
  source:
    repoURL: https://github.com/omilun/Talos-on-macos
    targetRevision: main
    path: gitops/example-apps/pulse/deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: pulse
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
