# clusters/tart-lab/infrastructure.yaml
# Flux Kustomizations for infrastructure — split into two layers:
#
#  1. infrastructure     — HelmRepositories, HelmReleases (cert-manager, ArgoCD,
#                          monitoring), namespaces, networking (GatewayClass, Gateway).
#                          wait: true ensures all HelmReleases are Ready before
#                          infrastructure-config proceeds.
#
#  2. infrastructure-config — ClusterIssuers + wildcard cert.
#                             Depends on infrastructure so cert-manager CRDs exist.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/infrastructure
  prune: true
  wait: true
  timeout: 15m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-config
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/infrastructure/cert-manager-config
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: infrastructure
---
# otel-collector: OpenTelemetryCollector CR — depends on infrastructure so
# the OTel Operator HelmRelease installs the CRDs before this CR is applied.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: otel-collector
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/infrastructure/otel-collector
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: infrastructure

