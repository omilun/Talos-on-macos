# Argo Workflows CI pipeline for pulse app
# Builds backend + frontend images with Kaniko and pushes to Harbor
# Trigger: manually or via webhook/cron
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: pulse-build
  namespace: argo
spec:
  entrypoint: build-all
  serviceAccountName: argo-workflows-sa
  volumes:
    - name: docker-config
      secret:
        secretName: harbor-registry-secret
        items:
          - key: .dockerconfigjson
            path: config.json
    - name: workspace
      emptyDir: {}

  templates:
    # ─── entry: fan-out backend + frontend in parallel ─────────────────────
    - name: build-all
      dag:
        tasks:
          - name: backend
            template: kaniko-build
            arguments:
              parameters:
                - name: context
                  value: "https://codeload.github.com/omilun/pulse/tar.gz/refs/heads/main"
                - name: context_sub_path
                  value: pulse-main/backend
                - name: destination
                  value: registry.talos-tart-ha.talos-on-macos.com/pulse/backend:latest
          - name: frontend
            template: kaniko-build
            arguments:
              parameters:
                - name: context
                  value: "https://codeload.github.com/omilun/pulse/tar.gz/refs/heads/main"
                - name: context_sub_path
                  value: pulse-main/frontend
                - name: destination
                  value: registry.talos-tart-ha.talos-on-macos.com/pulse/frontend:latest

    # ─── Kaniko build template ─────────────────────────────────────────────
    - name: kaniko-build
      inputs:
        parameters:
          - name: context
          - name: context_sub_path
          - name: destination
      container:
        image: gcr.io/kaniko-project/executor:latest
        args:
          - --context={{inputs.parameters.context}}
          - --context-sub-path={{inputs.parameters.context_sub_path}}
          - --dockerfile=Dockerfile
          - --destination={{inputs.parameters.destination}}
          - --skip-tls-verify
          - --skip-tls-verify-pull
          - --cache=false
        volumeMounts:
          - name: docker-config
            mountPath: /kaniko/.docker
        resources:
          requests:
            memory: 512Mi
            cpu: 500m
          limits:
            memory: 2Gi
            cpu: 1000m
