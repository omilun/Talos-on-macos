# HTTPRoute — exposes the Argo Events webhook endpoint.
# GitHub sends push events to this URL:
#   https://events.talos-tart-ha.talos-on-macos.com/pulse/push
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-events-pulse
  namespace: argo
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: kube-system
  hostnames:
    - events.talos-tart-ha.talos-on-macos.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /pulse
      backendRefs:
        - name: pulse-github-eventsource-svc
          port: 12000
