# ArgoCD Application — pulse-ci
# Deploys the Argo Workflows CI pipeline resources (RBAC + WorkflowTemplate)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pulse-ci
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: apps
  source:
    repoURL: https://github.com/omilun/Talos-on-macos
    targetRevision: main
    path: gitops/apps/pulse/ci
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
