apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - backend.yaml
  - frontend.yaml
  - rbac.yaml
  - httproute.yaml

# Override the upstream ghcr.io image names with the internal Zot registry + SHA tag.
# To deploy a new release: update newTag in both entries below.
images:
  - name: ghcr.io/omilun/xafrun-backend
    newName: registry.talos-tart-ha.talos-on-macos.com/xafrun-backend
    newTag: sha-5022aab2f06532431e93d030995bb726c1d854e3
  - name: ghcr.io/omilun/xafrun-frontend
    newName: registry.talos-tart-ha.talos-on-macos.com/xafrun-frontend
    newTag: sha-5022aab2f06532431e93d030995bb726c1d854e3
