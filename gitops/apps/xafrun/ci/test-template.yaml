# Argo Workflows — lint + test pipeline for Xafrun.
#
# Runs in parallel:
#   - go vet + go build on the Go backend (race detector disabled to fit 4Gi nodes)
#   - npm ci, npm run lint, npm run build on the Next.js frontend
#   - helm lint + helm template on the chart
#
# Triggered as a step inside xafrun-build (pre-build) and stand-alone via
# the Argo Workflows UI.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: xafrun-test
  namespace: argo
spec:
  entrypoint: test
  serviceAccountName: argo-workflows-sa
  arguments:
    parameters:
      - name: sha
        value: "master"

  templates:
    - name: test
      inputs:
        parameters:
          - name: sha
      dag:
        tasks:
          - name: backend
            template: go-test
            arguments:
              parameters:
                - {name: sha, value: "{{inputs.parameters.sha}}"}

          - name: frontend
            template: npm-test
            arguments:
              parameters:
                - {name: sha, value: "{{inputs.parameters.sha}}"}

          - name: helm
            template: helm-lint
            arguments:
              parameters:
                - {name: sha, value: "{{inputs.parameters.sha}}"}

    # ── Go: vet + build (race detector disabled — insufficient node memory) ───
    - name: go-test
      inputs:
        parameters: [{name: sha}]
      container:
        image: golang:1.26-alpine
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            apk add --no-cache git >/dev/null
            git clone --depth=1 https://github.com/omilun/Xafrun.git /src
            cd /src && git checkout "{{inputs.parameters.sha}}"
            cd backend
            go vet ./...
            go build ./...
            echo "✅ go vet + build passed"
        resources:
          requests: {memory: 512Mi, cpu: 500m}
          limits:   {memory: 2Gi,   cpu: 1000m}
    - name: npm-test
      inputs:
        parameters: [{name: sha}]
      container:
        image: node:22-alpine
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            apk add --no-cache git >/dev/null
            git clone --depth=1 https://github.com/omilun/Xafrun.git /src
            cd /src && git checkout "{{inputs.parameters.sha}}"
            cd frontend
            npm ci --prefer-offline
            npm run lint
            npm run build
            echo "✅ lint + build passed"
        resources:
          requests: {memory: 512Mi, cpu: 500m}
          limits:   {memory: 2Gi,   cpu: 1000m}

    # ── Helm chart: lint + template render ───────────────────────────────────
    - name: helm-lint
      inputs:
        parameters: [{name: sha}]
      container:
        image: alpine/helm:3.16.4
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            apk add --no-cache git >/dev/null
            git clone --depth=1 https://github.com/omilun/Xafrun.git /src
            cd /src && git checkout "{{inputs.parameters.sha}}"
            helm lint charts/xafrun
            helm template test charts/xafrun >/dev/null
            echo "✅ helm lint + template passed"
        resources:
          requests: {memory: 128Mi, cpu: 100m}
          limits:   {memory: 256Mi, cpu: 200m}
