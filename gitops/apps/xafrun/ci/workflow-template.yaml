apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: xafrun-build
  namespace: argo
spec:
  entrypoint: pipeline
  serviceAccountName: argo-workflows-sa
  arguments:
    parameters:
      - name: sha
        value: "master"

  templates:
    # ── Entry: lint+test → build images in parallel → vulnerability scan ─────
    - name: pipeline
      dag:
        tasks:
          - name: test
            templateRef:
              name: xafrun-test
              template: test
            arguments:
              parameters:
                - {name: sha, value: "{{workflow.parameters.sha}}"}

          - name: build-backend
            template: buildkit-build
            dependencies: [test]
            arguments:
              parameters:
                - {name: image,   value: xafrun-backend}
                - {name: subpath, value: backend}
                - {name: sha,     value: "{{workflow.parameters.sha}}"}

          - name: build-frontend
            template: buildkit-build
            dependencies: [test]
            arguments:
              parameters:
                - {name: image,   value: xafrun-frontend}
                - {name: subpath, value: frontend}
                - {name: sha,     value: "{{workflow.parameters.sha}}"}

          - name: scan-backend
            templateRef:
              name: xafrun-scan
              template: trivy-image
            dependencies: [build-backend]
            arguments:
              parameters:
                - {name: image, value: "xafrun-backend:sha-{{workflow.parameters.sha}}"}

          - name: scan-frontend
            templateRef:
              name: xafrun-scan
              template: trivy-image
            dependencies: [build-frontend]
            arguments:
              parameters:
                - {name: image, value: "xafrun-frontend:sha-{{workflow.parameters.sha}}"}

    # ── BuildKit build: connects to the persistent cluster-wide buildkitd ────
    - name: buildkit-build
      inputs:
        parameters:
          - name: image
          - name: subpath
          - name: sha
      container:
        image: moby/buildkit:v0.19.0
        command: [buildctl]
        args:
          - --addr=tcp://buildkitd.buildkit.svc.cluster.local:1234
          - build
          - --frontend=dockerfile.v0
          - --opt=context=https://github.com/omilun/Xafrun.git#{{inputs.parameters.sha}}:{{inputs.parameters.subpath}}
          - --opt=filename=Dockerfile
          - --output=type=image,name=registry.talos-tart-ha.talos-on-macos.com/{{inputs.parameters.image}}:sha-{{inputs.parameters.sha}},push=true,registry.insecure=true,oci-mediatypes=true
        resources:
          requests: {memory: 256Mi, cpu: 200m}
          limits:   {memory: 1Gi,   cpu: 1000m}
