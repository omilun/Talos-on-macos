# HTTPRoute — exposes the Argo Events webhook endpoint for Xafrun.
# GitHub sends push/tag events to:
#   https://events.talos-tart-ha.talos-on-macos.com/xafrun/push
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-events-xafrun
  namespace: argo
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: kube-system
  hostnames:
    - events.talos-tart-ha.talos-on-macos.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /xafrun
      backendRefs:
        - name: xafrun-github-eventsource-svc
          port: 12000
