# Argo Workflows — Trivy CVE scan for Xafrun images.
#
# Two entry templates:
#   - trivy-image: scan a single image (used by xafrun-build)
#   - scan-all:    scan both backend and frontend latest tags (used by the
#                  nightly CronWorkflow)
#
# Severity threshold: CRITICAL,HIGH. Set exitCode=0 (non-blocking) for
# build-pipeline use; the nightly CronWorkflow uses exitCode=1 and writes
# a Slack/notification on failure (left as a TODO).
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: xafrun-scan
  namespace: argo
spec:
  entrypoint: scan-all
  serviceAccountName: argo-workflows-sa

  templates:
    # ── Scan a single image (called per-build) ───────────────────────────────
    - name: trivy-image
      inputs:
        parameters:
          - name: image                  # e.g. xafrun-backend:sha-abc1234
          - name: severity
            value: "CRITICAL,HIGH"
          - name: exitCode
            value: "0"                   # 0 = report only, 1 = fail workflow
      container:
        image: aquasec/trivy:0.58.1
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            trivy image \
              --severity {{inputs.parameters.severity}} \
              --exit-code {{inputs.parameters.exitCode}} \
              --no-progress \
              --ignore-unfixed \
              --insecure \
              zot.registry.svc.cluster.local:5000/{{inputs.parameters.image}}
        resources:
          requests: {memory: 256Mi, cpu: 200m}
          limits:   {memory: 1Gi,   cpu: 1000m}

    # ── Scan all currently-deployed images (called by nightly cron) ──────────
    # Uses the most recent tag in Zot by listing tags and scanning the latest SHA.
    - name: scan-all
      inputs:
        parameters:
          - name: backend-tag
            value: "xafrun-backend:latest-built"
          - name: frontend-tag
            value: "xafrun-frontend:latest-built"
      dag:
        tasks:
          - name: get-tags
            template: resolve-latest-tags
          - name: backend
            template: trivy-image
            dependencies: [get-tags]
            arguments:
              parameters:
                - {name: image,    value: "xafrun-backend:{{tasks.get-tags.outputs.parameters.backend-sha}}"}
                - {name: exitCode, value: "1"}
          - name: frontend
            template: trivy-image
            dependencies: [get-tags]
            arguments:
              parameters:
                - {name: image,    value: "xafrun-frontend:{{tasks.get-tags.outputs.parameters.frontend-sha}}"}
                - {name: exitCode, value: "1"}

    # ── Resolve latest SHA tags from Zot ─────────────────────────────────────
    - name: resolve-latest-tags
      outputs:
        parameters:
          - name: backend-sha
            valueFrom: {path: /tmp/backend-sha}
          - name: frontend-sha
            valueFrom: {path: /tmp/frontend-sha}
      container:
        image: curlimages/curl:8.6.0
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            REGISTRY=zot.registry.svc.cluster.local:5000
            get_latest() {
              curl -sf "http://${REGISTRY}/v2/$1/tags/list" \
                | grep -o '"sha-[^"]*"' | tr -d '"' | sort | tail -1
            }
            get_latest xafrun-backend  > /tmp/backend-sha
            get_latest xafrun-frontend > /tmp/frontend-sha
            echo "backend:  $(cat /tmp/backend-sha)"
            echo "frontend: $(cat /tmp/frontend-sha)"
        resources:
          requests: {memory: 64Mi, cpu: 50m}
