# ArgoCD Application — xafrun
# Deploys Xafrun (GitOps visualizer dashboard) into the xafrun namespace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: xafrun
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: apps
  source:
    repoURL: https://github.com/omilun/Talos-on-macos
    targetRevision: main
    path: gitops/apps/xafrun/deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: xafrun
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
