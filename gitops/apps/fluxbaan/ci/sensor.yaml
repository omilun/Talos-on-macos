# Argo Events — Sensors for the Fluxbaan CI pipeline.
#
# Two sensors share the same EventSource (fluxbaan-github):
#   1. fluxbaan-ci      — runs fluxbaan-build on every push to master
#                         (additionally runs fluxbaan-docs if docs/ or
#                          mkdocs.yml changed; see filter below)
#   2. fluxbaan-release — runs fluxbaan-release on every tag create event
#                         matching v*.*.* (semver tags only)
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: fluxbaan-ci
  namespace: argo
spec:
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: fluxbaan-push
      eventSourceName: fluxbaan-github
      eventName: fluxbaan-push
      filters:
        data:
          - path: body.ref
            type: string
            value:
              - refs/heads/master
  triggers:
    - template:
        name: trigger-fluxbaan-build
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: fluxbaan-build-
                namespace: argo
              spec:
                workflowTemplateRef:
                  name: fluxbaan-build
                arguments:
                  parameters:
                    - name: sha
                      value: "placeholder"
          parameters:
            - src:
                dependencyName: fluxbaan-push
                dataKey: body.after
              dest: spec.arguments.parameters.0.value

    # Same push triggers a docs rebuild (cheap; no-op if docs unchanged is
    # not implemented — mkdocs build is fast enough that we just always run
    # it). If you want to gate by changed paths, wire body.commits[*].modified
    # into a Sensor filter.
    - template:
        name: trigger-fluxbaan-docs
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: fluxbaan-docs-
                namespace: argo
              spec:
                workflowTemplateRef:
                  name: fluxbaan-docs
                arguments:
                  parameters:
                    - name: sha
                      value: "placeholder"
          parameters:
            - src:
                dependencyName: fluxbaan-push
                dataKey: body.after
              dest: spec.arguments.parameters.0.value

---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: fluxbaan-release
  namespace: argo
spec:
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: fluxbaan-tag
      eventSourceName: fluxbaan-github
      eventName: fluxbaan-push
      filters:
        data:
          - path: body.ref_type
            type: string
            value: ["tag"]
          - path: body.ref
            type: string
            comparator: "=~"
            value: ["^v[0-9]+\\.[0-9]+\\.[0-9]+$"]
  triggers:
    - template:
        name: trigger-fluxbaan-release
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: fluxbaan-release-
                namespace: argo
              spec:
                workflowTemplateRef:
                  name: fluxbaan-release
                arguments:
                  parameters:
                    - {name: tag, value: "placeholder-tag"}
                    - {name: sha, value: "placeholder-sha"}
          parameters:
            - src:
                dependencyName: fluxbaan-tag
                dataKey: body.ref
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: fluxbaan-tag
                # GitHub `create` events for tags don't carry the SHA in
                # `after`. Use `head_commit.id` from the followup push, or
                # fall back to the ref name itself for BuildKit.
                dataKey: body.master_branch
              dest: spec.arguments.parameters.1.value
