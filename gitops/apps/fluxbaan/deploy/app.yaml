apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluxbaan-backend
  namespace: fluxbaan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluxbaan-backend
  template:
    metadata:
      labels:
        app: fluxbaan-backend
    spec:
      serviceAccountName: fluxbaan-backend
      containers:
      - name: backend
        image: registry.talos-tart-ha.talos-on-macos.com/fluxbaan-backend:sha-c596574298aa98ef7075a6193c9c6ea7cb831893
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: fluxbaan-backend
  namespace: fluxbaan
spec:
  selector:
    app: fluxbaan-backend
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluxbaan-frontend
  namespace: fluxbaan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluxbaan-frontend
  template:
    metadata:
      labels:
        app: fluxbaan-frontend
    spec:
      containers:
      - name: frontend
        image: registry.talos-tart-ha.talos-on-macos.com/fluxbaan-frontend:sha-c596574298aa98ef7075a6193c9c6ea7cb831893
        ports:
        - containerPort: 3000
        env:
        - name: BACKEND_URL
          value: "http://fluxbaan-backend.fluxbaan.svc.cluster.local:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: fluxbaan-frontend
  namespace: fluxbaan
spec:
  selector:
    app: fluxbaan-frontend
  ports:
  - port: 80
    targetPort: 3000
