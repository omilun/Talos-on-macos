# ArgoCD AppProject — apps
# All user applications (pulse, future apps) belong to this project.
# Infrastructure components stay in the 'default' project managed by Flux.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  description: User applications deployed via ArgoCD
  sourceRepos:
    - "https://github.com/omilun/Talos-on-macos"
    - "https://github.com/omilun/pulse"
    - "https://github.com/omilun/Xafrun"
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
