# infrastructure/tart-lab/apps.yaml
# Flux Kustomization: reconciles user applications after infrastructure is ready.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/example-apps
  prune: true
  dependsOn:
    - name: infrastructure
  timeout: 5m
