# OpenTelemetryCollector — deployed by the OTel Operator
#
# Deployed in monitoring namespace (alongside Tempo, Prometheus, Loki).
# Pulse services send OTLP to: http://otel-collector.opentelemetry.svc:4317 (gRPC)
#                         or:  http://otel-collector.opentelemetry.svc:4318 (HTTP)
#
# Pipeline:
#   traces  → Tempo (OTLP gRPC)
#   metrics → Prometheus (remote_write)
#   logs    → Loki (HTTP push)
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector
  namespace: opentelemetry
spec:
  mode: deployment
  replicas: 1

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      batch:
        timeout: 5s
        send_batch_size: 512

      resource:
        attributes:
          - action: insert
            key: cluster
            value: talos-tart-ha

      memory_limiter:
        limit_mib: 256
        spike_limit_mib: 64
        check_interval: 5s

    exporters:
      # Traces → Grafana Tempo
      otlp/tempo:
        endpoint: "tempo.monitoring.svc.cluster.local:4317"
        tls:
          insecure: true

      # Metrics → Prometheus (remote write)
      prometheusremotewrite:
        endpoint: "http://prometheus-operated.monitoring.svc.cluster.local:9090/api/v1/write"
        tls:
          insecure: true

      # Logs → Loki via OTLP HTTP (Loki 3.x+ native OTLP ingestion)
      otlphttp/loki:
        endpoint: "http://loki-gateway.monitoring.svc.cluster.local/otlp"
        tls:
          insecure: true

      # Debug (low verbosity — keeps logs clean)
      debug:
        verbosity: basic

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlp/tempo, debug]

        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheusremotewrite]

        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlphttp/loki]
