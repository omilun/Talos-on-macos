# HTTPRoute for Argo Workflows UI — attaches to the shared Cilium Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-workflows
  namespace: argo
spec:
  parentRefs:
    - name: main-gateway
      namespace: networking
  hostnames:
    - "workflows.talos-tart-ha.talos-on-macos.com"
  rules:
    - backendRefs:
        - name: argo-workflows-server
          port: 2746
