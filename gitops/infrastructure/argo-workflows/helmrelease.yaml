# Argo Workflows — managed by Flux
# Installed in the 'argo' namespace, accessible via Gateway HTTPRoute.
# Controller mode: workflow (not server) — server is separate for UI.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-workflows
  namespace: argo
spec:
  interval: 30m
  chart:
    spec:
      chart: argo-workflows
      version: ">=0.41.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controller:
      replicas: 1
    server:
      enabled: true
      extraArgs:
        - --auth-mode=server   # simple auth for homelab; use SSO in prod
    workflow:
      serviceAccount:
        create: true
      rbac:
        create: true
    useDefaultArtifactRepo: false
