# ingress.yaml
# Kubernetes Ingress resources for monitoring services.
# Domain pattern: <service>.talos-tart-ha.talos-on-macos.com
# TLS via shared wildcard cert (wildcard-cluster-tls in networking ns, copied to monitoring).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: flux
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
spec:
  ingressClassName: nginx
  rules:
  - host: grafana.talos-tart-ha.talos-on-macos.com
    http:
      paths:
      - backend:
          service:
            name: kube-prometheus-stack-grafana
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - grafana.talos-tart-ha.talos-on-macos.com
    secretName: wildcard-cluster-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: flux
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
spec:
  ingressClassName: nginx
  rules:
  - host: prometheus.talos-tart-ha.talos-on-macos.com
    http:
      paths:
      - backend:
          service:
            name: kube-prometheus-stack-prometheus
            port:
              number: 9090
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - prometheus.talos-tart-ha.talos-on-macos.com
    secretName: wildcard-cluster-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: flux
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
spec:
  ingressClassName: nginx
  rules:
  - host: alertmanager.talos-tart-ha.talos-on-macos.com
    http:
      paths:
      - backend:
          service:
            name: kube-prometheus-stack-alertmanager
            port:
              number: 9093
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - alertmanager.talos-tart-ha.talos-on-macos.com
    secretName: wildcard-cluster-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loki
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: flux
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
spec:
  ingressClassName: nginx
  rules:
  - host: loki.talos-tart-ha.talos-on-macos.com
    http:
      paths:
      - backend:
          service:
            name: loki-gateway
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - loki.talos-tart-ha.talos-on-macos.com
    secretName: wildcard-cluster-tls
