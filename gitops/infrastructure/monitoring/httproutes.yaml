# monitoring/httproutes.yaml
# HTTPRoutes for monitoring stack — all attach to main-gateway in networking ns.
# TLS terminated by Cilium Gateway (wildcard-cluster-tls cert from cert-manager).
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  parentRefs:
    - name: main-gateway
      namespace: networking
      sectionName: https
  hostnames:
    - "grafana.talos-tart-ha.talos-on-macos.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
