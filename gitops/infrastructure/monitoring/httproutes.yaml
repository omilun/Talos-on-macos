# infrastructure/monitoring/httproutes.yaml
# Exposes Grafana, Prometheus, and Alertmanager UIs via the shared main-gateway.
#
# Add to /etc/hosts on macOS (replace IP with the Gateway LoadBalancer IP):
#   192.168.64.200  grafana.local prometheus.local alertmanager.local
#
# Get IP: kubectl get gateway main-gateway -n networking -o jsonpath='{.status.addresses[0].value}'
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  parentRefs:
    - name: main-gateway
      namespace: networking
      sectionName: https
  hostnames:
    - "grafana.local"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  parentRefs:
    - name: main-gateway
      namespace: networking
      sectionName: https
  hostnames:
    - "prometheus.local"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  parentRefs:
    - name: main-gateway
      namespace: networking
      sectionName: https
  hostnames:
    - "alertmanager.local"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-alertmanager
          port: 9093
