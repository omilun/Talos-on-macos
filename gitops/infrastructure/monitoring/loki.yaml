# infrastructure/monitoring/loki.yaml
# Grafana Loki in single-binary (monolithic) mode — appropriate for dev clusters.
# Promtail ships logs from all pods to Loki.
#
# Grafana datasource for Loki is pre-configured in kube-prometheus-stack.yaml.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 30m
  dependsOn:
    - name: kube-prometheus-stack
  chart:
    spec:
      chart: loki
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    # Single-binary mode (all components in one pod) — good for dev
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

    singleBinary:
      replicas: 1
      persistence:
        enabled: false   # emptyDir for dev

    # Disable components not needed in single-binary mode
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0

    gateway:
      enabled: true

    # Disable Minio (we use filesystem storage)
    minio:
      enabled: false

    # Grafana dashboard for Loki
    grafana-agent-operator:
      enabled: false
---
# Promtail — ships logs from every node to Loki
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: monitoring
spec:
  interval: 30m
  dependsOn:
    - name: loki
  chart:
    spec:
      chart: promtail
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    config:
      clients:
        - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push

    # Talos: pods run in read-only containers — tolerations needed for DaemonSet
    tolerations:
      - operator: Exists
