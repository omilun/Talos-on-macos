# OpenTelemetry Operator — manages OpenTelemetryCollector and Instrumentation CRDs
#
# Uses its own self-signed cert management for admission webhooks
# (admissionWebhooks.certManager.enabled: false) to avoid cert-manager timing dependency.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-operator
  namespace: opentelemetry
spec:
  interval: 30m
  chart:
    spec:
      chart: opentelemetry-operator
      version: ">=0.111.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: flux-system
      interval: 24h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    admissionWebhooks:
      certManager:
        enabled: false   # use operator's own cert rotation, no cert-manager dependency
      autoGenerateCert:
        enabled: true

    manager:
      collectorImage:
        repository: otel/opentelemetry-collector-contrib
        tag: "0.122.0"

    # Metrics for the operator itself
    serviceMonitor:
      enabled: true
