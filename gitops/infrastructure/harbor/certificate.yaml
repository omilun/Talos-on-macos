# TLS Certificate for Zot registry
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: registry-tls
  namespace: registry
spec:
  secretName: registry-tls
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  commonName: registry.talos-tart-ha.talos-on-macos.com
  dnsNames:
    - registry.talos-tart-ha.talos-on-macos.com
    - zot.registry.svc.cluster.local
