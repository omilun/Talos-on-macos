apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: harbor
spec:
  interval: 30m
  chart:
    spec:
      chart: harbor
      version: "1.16.*"
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: flux-system
  values:
    expose:
      type: ingress
      tls:
        enabled: true
        certSource: secret
        secret:
          secretName: harbor-tls
      ingress:
        hosts:
          core: harbor.talos-tart-ha.talos-on-macos.com
        className: ""
        annotations:
          kubernetes.io/ingress.class: ""

    externalURL: https://harbor.talos-tart-ha.talos-on-macos.com

    # Use internal self-signed TLS via cert-manager
    internalTLS:
      enabled: false

    # Persistence via local-path
    persistence:
      enabled: true
      resourcePolicy: keep
      persistentVolumeClaim:
        registry:
          storageClass: local-path
          size: 20Gi
        jobservice:
          storageClass: local-path
          size: 1Gi
        database:
          storageClass: local-path
          size: 2Gi
        redis:
          storageClass: local-path
          size: 1Gi
        trivy:
          storageClass: local-path
          size: 5Gi

    # Disable trivy scanner to save resources
    trivy:
      enabled: false

    # Admin password (override via secret post-install)
    harborAdminPassword: "Harbor12345"

    # Resource limits for 2-CPU nodes
    registry:
      resources:
        requests:
          memory: 128Mi
          cpu: 50m
    core:
      resources:
        requests:
          memory: 128Mi
          cpu: 50m
    jobservice:
      resources:
        requests:
          memory: 128Mi
          cpu: 50m
    portal:
      resources:
        requests:
          memory: 64Mi
          cpu: 20m
    database:
      internal:
        resources:
          requests:
            memory: 256Mi
            cpu: 50m
    redis:
      internal:
        resources:
          requests:
            memory: 64Mi
            cpu: 20m
