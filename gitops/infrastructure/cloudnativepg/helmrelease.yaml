# CloudNativePG operator — managed by Flux
# Installs the CNPG operator in cnpg-system.
# Database Cluster resources are declared per-app in gitops/apps/<app>/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnativepg
  namespace: cnpg-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cloudnative-pg
      version: ">=0.23.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: cloudnativepg
        namespace: flux-system
      interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
