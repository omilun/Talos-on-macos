# infrastructure/networking/gateway.yaml
# Shared Gateway in the 'networking' namespace.
# All services (ArgoCD, Grafana, Prometheus, etc.) attach HTTPRoutes to this
# single Gateway. This avoids provisioning a separate LoadBalancer IP per service.
#
# Listeners:
#   - http  (port 80):  redirect or passthrough (used for ACME HTTP-01 challenges)
#   - https (port 443): TLS termination using wildcard cert from cert-manager
#
# The 'wildcard-tls' secret is created by cert-manager (see cert-manager layer).
# Until cert-manager runs, the HTTPS listener will show as "not programmed" — expected.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: networking
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-tls
            namespace: networking
      allowedRoutes:
        namespaces:
          from: All
