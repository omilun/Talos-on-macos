# external-dns.yaml
# In-cluster CoreDNS that resolves service hostnames to the
# Cilium Gateway LoadBalancer IP (assigned from CiliumLoadBalancerIPPool 192.168.64.200/28).
#
# The IP below is a placeholder — setup-dns.sh auto-discovers the actual Gateway
# LoadBalancer IP and updates this ConfigMap on every run.
#
# Domain pattern: <service>.<cluster>.<repo>.com
#   Cluster: talos-tart-ha
#   Example: argocd.talos-tart-ha.talos-on-macos.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: external-coredns
  namespace: networking
  labels:
    app.kubernetes.io/managed-by: flux
data:
  Corefile: |
    talos-on-macos.com:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        hosts {
            192.168.64.192 argocd.talos-tart-ha.talos-on-macos.com
            192.168.64.192 grafana.talos-tart-ha.talos-on-macos.com
            192.168.64.192 prometheus.talos-tart-ha.talos-on-macos.com
            192.168.64.192 alertmanager.talos-tart-ha.talos-on-macos.com
            192.168.64.192 loki.talos-tart-ha.talos-on-macos.com
            192.168.64.192 workflows.talos-tart-ha.talos-on-macos.com
            192.168.64.192 registry.talos-tart-ha.talos-on-macos.com
            192.168.64.192 pulse.talos-tart-ha.talos-on-macos.com
            192.168.64.192 api.pulse.talos-tart-ha.talos-on-macos.com
            192.168.64.192 talos-tart-ha.talos-on-macos.com
            fallthrough
        }
        forward . /etc/resolv.conf
        cache 30
        reload
        log
    }
    .:53 {
        forward . /etc/resolv.conf
        cache 30
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-coredns
  namespace: networking
  labels:
    app: external-coredns
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-coredns
  template:
    metadata:
      labels:
        app: external-coredns
    spec:
      containers:
      - name: coredns
        image: coredns/coredns:1.11.3
        args: ["-conf", "/etc/coredns/Corefile"]
        ports:
        - containerPort: 53
          protocol: UDP
          name: dns-udp
        - containerPort: 53
          protocol: TCP
          name: dns-tcp
        - containerPort: 8080
          name: health
        - containerPort: 8181
          name: ready
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 8181
          initialDelaySeconds: 5
        volumeMounts:
        - name: config
          mountPath: /etc/coredns
      volumes:
      - name: config
        configMap:
          name: external-coredns
---
apiVersion: v1
kind: Service
metadata:
  name: external-coredns
  namespace: networking
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    app: external-coredns
  type: NodePort
  ports:
  - name: dns-udp
    port: 53
    targetPort: 53
    protocol: UDP
    nodePort: 30053
  - name: dns-tcp
    port: 53
    targetPort: 53
    protocol: TCP
    nodePort: 30053
