# infrastructure/networking/cilium-resources.yaml
# Cilium-specific networking resources:
#   - GatewayClass: tells Cilium to act as the Gateway API controller
#   - CiliumLoadBalancerIPPool: range of IPs to assign to LoadBalancer services
#   - CiliumL2AnnouncementPolicy: ARP announcements so macOS can reach LB IPs
#
# IP pool 192.168.64.200-215 is within the Tart vmnet-shared subnet (192.168.64.0/24).
# Adjust if your Tart subnet is different.
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: cilium
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  controllerName: io.cilium/gateway-controller
---
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: default-pool
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  cidrs:
    - cidr: "192.168.64.200/28"
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default-l2-policy
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  loadBalancerIPs: true
  externalIPs: true
  # Select all nodes — all Tart VMs run on the same macOS bridge
  nodeSelector:
    matchLabels: {}
  # Match the primary interface name used by Talos on Tart VMs
  interfaces:
    - ^enp0s1
