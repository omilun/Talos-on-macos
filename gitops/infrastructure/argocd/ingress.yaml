# ingress.yaml
# nginx Ingress for ArgoCD.
# ArgoCD runs with server.insecure=true (HTTP on port 8080).
# nginx terminates TLS and forwards HTTP to argocd-server:80.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: flux
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: argocd.talos-tart-ha.talos-on-macos.com
    http:
      paths:
      - backend:
          service:
            name: argocd-server
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - argocd.talos-tart-ha.talos-on-macos.com
    secretName: wildcard-cluster-tls
---
# Wildcard certificate for *.talos-tart-ha.talos-on-macos.com in argocd namespace.
# Explicit resource (not ingress-shim annotation) so SANs can cover all services.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-cluster-tls
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  secretName: wildcard-cluster-tls
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  commonName: "*.talos-tart-ha.talos-on-macos.com"
  dnsNames:
  - "*.talos-tart-ha.talos-on-macos.com"
  - "argocd.talos-tart-ha.talos-on-macos.com"
  duration: 8760h
  renewBefore: 720h
