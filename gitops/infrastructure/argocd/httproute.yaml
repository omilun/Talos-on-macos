# infrastructure/argocd/httproute.yaml
# Routes argocd.local traffic from the shared main-gateway to the ArgoCD server.
# Add to /etc/hosts on macOS: <LoadBalancer-IP> argocd.local
# Get the LoadBalancer IP: kubectl get gateway main-gateway -n networking
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  parentRefs:
    - name: main-gateway
      namespace: networking
      sectionName: https
  hostnames:
    - "argocd.local"
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
