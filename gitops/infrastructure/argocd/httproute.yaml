# argocd/httproute.yaml
# HTTPRoute for ArgoCD — attaches to the main-gateway in networking ns.
# ArgoCD server runs with server.insecure=true (plain HTTP internally).
# TLS is terminated by the Cilium Gateway using the wildcard cert.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  parentRefs:
    - name: main-gateway
      namespace: networking
      sectionName: https
  hostnames:
    - "argocd.talos-tart-ha.talos-on-macos.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
